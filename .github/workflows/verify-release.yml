# Download the latest (or specified) published release asset and run the same
# six gates documented in RELEASE_VERIFICATION.md. Fails loudly if any gate
# fails, so a bad artifact cannot silently linger on the Releases page.
#
# Runs automatically on every published release, and can be dispatched
# manually against any tag.
#
# No signing or notarization secrets are needed — this job only DOWNLOADS
# the public release asset and verifies it. It is safe to run on any fork.

name: Verify release asset

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to verify (e.g. v0.2.2). Leave empty for latest."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  verify:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Determine tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="$(gh release view --repo "${{ github.repository }}" --json tagName -q .tagName)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Verifying release: $TAG"

      - name: Download release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir verify && cd verify
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "Lisan-*.zip"
          ls -lh

      - name: Record zip SHA-256
        run: |
          cd verify
          shasum -a 256 Lisan-*.zip | tee zip.sha256

      - name: Unzip with plain unzip (end-user path)
        run: |
          cd verify
          unzip -q Lisan-*.zip
          ls -la

      - name: Gate 1 — no AppleDouple files inside bundle
        run: |
          cd verify
          APP="$(find . -maxdepth 3 -name 'Lisan.app' | head -1)"
          echo "Bundle: $APP"
          FOUND=$(find "$APP" -name '._*' | head)
          if [ -n "$FOUND" ]; then
            echo "::error::AppleDouple files inside bundle — zip was built without --sequesterRsrc:"
            echo "$FOUND"
            exit 1
          fi
          echo "clean ✓"

      - name: Gate 2 — codesign --verify --deep --strict
        run: |
          cd verify
          APP="$(find . -maxdepth 3 -name 'Lisan.app' | head -1)"
          codesign --verify --deep --strict --verbose=4 "$APP"

      - name: Gate 3 — spctl Gatekeeper assessment
        run: |
          cd verify
          APP="$(find . -maxdepth 3 -name 'Lisan.app' | head -1)"
          OUT=$(spctl -a -vv "$APP" 2>&1)
          echo "$OUT"
          echo "$OUT" | grep -q "accepted" || { echo "::error::spctl did not report 'accepted'"; exit 1; }
          echo "$OUT" | grep -q "Notarized Developer ID" || {
            echo "::error::source is not 'Notarized Developer ID'"
            exit 1
          }

      - name: Gate 4 — stapler validate
        run: |
          cd verify
          APP="$(find . -maxdepth 3 -name 'Lisan.app' | head -1)"
          xcrun stapler validate "$APP"

      - name: Gate 5 — entitlements reduced to audio-input only
        run: |
          cd verify
          APP="$(find . -maxdepth 3 -name 'Lisan.app' | head -1)"
          ENTS=$(codesign -d --entitlements - "$APP" 2>&1)
          echo "$ENTS"
          if echo "$ENTS" | grep -q "allow-dyld-environment-variables"; then
            echo "::error::Release entitlements include DYLD env var exception — regression"
            exit 1
          fi
          if ! echo "$ENTS" | grep -q "com.apple.security.device.audio-input"; then
            echo "::error::Missing com.apple.security.device.audio-input"
            exit 1
          fi
          echo "entitlements minimum-only ✓"

      - name: Gate 6 — hardened runtime + timestamp + Developer ID chain
        run: |
          cd verify
          APP="$(find . -maxdepth 3 -name 'Lisan.app' | head -1)"
          INFO=$(codesign -dv --verbose=4 "$APP" 2>&1)
          echo "$INFO"
          echo "$INFO" | grep -q "Runtime Version" || { echo "::error::No Runtime Version — hardened runtime missing"; exit 1; }
          echo "$INFO" | grep -q "Timestamp=" || { echo "::error::No Timestamp — release signature not timestamped"; exit 1; }
          echo "$INFO" | grep -q "Developer ID Application" || { echo "::error::Not Developer ID signed"; exit 1; }

      - name: Summary
        run: |
          echo "## Release verification" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Tag: **${{ steps.tag.outputs.tag }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat verify/zip.sha256 >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All six gates passed." >> "$GITHUB_STEP_SUMMARY"
