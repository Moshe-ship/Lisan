name: Steno
options:
  deploymentTarget:
    macOS: "13.0"
packages:
  StenoKit:
    path: ./StenoKit
targets:
  Steno:
    type: application
    platform: macOS
    sources:
      - path: Steno
      - path: packs
        buildPhase: resources
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.lisanapp.lisan
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        SWIFT_VERSION: 6.0
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Lisan needs microphone access for dictation.
        INFOPLIST_KEY_CFBundleName: Lisan
        INFOPLIST_KEY_CFBundleDisplayName: Lisan
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: Steno/Lisan.debug.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: Steno/Lisan.release.entitlements
          ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: StenoKit
        product: StenoKit
